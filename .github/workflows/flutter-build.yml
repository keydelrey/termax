name: Build Termax

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Setup signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=${{ github.workspace }}/release.jks
          EOF
          sed -i 's/^[[:space:]]*//' android/key.properties

      - name: Fetch PRoot binaries
        run: bash scripts/fetch-proot-binaries.sh

      - name: Verify PRoot binaries
        run: |
          echo "Checking jniLibs contents..."
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for lib in libproot.so libprootloader.so; do
              FILE="android/app/src/main/jniLibs/${abi}/${lib}"
              if [ ! -f "$FILE" ]; then
                echo "ERROR: Missing $FILE"
                exit 1
              fi
              SIZE=$(stat -c%s "$FILE")
              if [ "$SIZE" -lt 1000 ]; then
                echo "WARN: $FILE looks like a placeholder (${SIZE} bytes)"
              else
                echo "OK: $FILE (${SIZE} bytes)"
              fi
            done
          done

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build fat APK (all ABIs)
        run: flutter build apk --release

      - name: Build per-ABI APKs
        run: flutter build apk --release --split-per-abi

      - name: Build AAB (App Bundle)
        run: flutter build appbundle --release

      - name: Rename and collect artifacts
        id: apks
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          mkdir -p artifacts

          # Fat APK
          cp build/app/outputs/flutter-apk/app-release.apk \
             "artifacts/Termax-v${VERSION}-universal.apk"

          # Per-ABI APKs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SRC="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$SRC" ]; then
              cp "$SRC" "artifacts/Termax-v${VERSION}-${abi}.apk"
            fi
          done

          # AAB
          AAB="build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB" ]; then
            cp "$AAB" "artifacts/Termax-v${VERSION}.aab"
          fi

          # Summary
          echo "### Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in artifacts/*; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "| \`$(basename $f)\` | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "Built artifacts:"
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termax-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: termax-aab
          path: artifacts/*.aab
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: termax-aab
          path: artifacts/*.aab
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.apks.outputs.version }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = [
              `## Build Successful`,
              ``,
              `**Version:** \`v${version}\``,
              ``,
              `### Download APKs`,
              ``,
              `| Architecture | Download |`,
              `|---|---|`,
              `| arm64-v8a (recommended) | [Termax-v${version}-arm64-v8a.apk](${runUrl}#artifacts) |`,
              `| armeabi-v7a (32-bit) | [Termax-v${version}-armeabi-v7a.apk](${runUrl}#artifacts) |`,
              `| x86_64 (emulator) | [Termax-v${version}-x86_64.apk](${runUrl}#artifacts) |`,
              `| Universal (all ABIs) | [Termax-v${version}-universal.apk](${runUrl}#artifacts) |`,
              `| App Bundle (Play Store) | [Termax-v${version}.aab](${runUrl}#artifacts) |`,
              ``,
              `> Download from [**Actions Artifacts**](${runUrl}#artifacts)`,
              ``,
              `---`,
              `*Built from ${process.env.GITHUB_SHA.substring(0, 7)} by [GitHub Actions](${runUrl})*`,
            ].join('\n');

            // Find existing bot comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Build Successful')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment build failure on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## Build Failed`,
                ``,
                `The build failed for commit ${process.env.GITHUB_SHA.substring(0, 7)}.`,
                ``,
                `[View build logs](${runUrl})`,
              ].join('\n'),
            });

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: termax-apks
          path: artifacts

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: termax-aab
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Termax v${{ steps.version.outputs.version }}
          body: |
            ## Termax Android v${{ steps.version.outputs.version }}

            Terminal emulator for Android with Ubuntu.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `Termax-v${{ steps.version.outputs.version }}-arm64-v8a.apk` | Most modern Android phones (recommended) |
            | `Termax-v${{ steps.version.outputs.version }}-armeabi-v7a.apk` | Older 32-bit ARM devices |
            | `Termax-v${{ steps.version.outputs.version }}-x86_64.apk` | Emulators / x86 devices |
            | `Termax-v${{ steps.version.outputs.version }}-universal.apk` | All architectures (larger) |
            | `Termax-v${{ steps.version.outputs.version }}.aab` | Android App Bundle (Play Store) |

            ### First Run
            1. Install the APK
            2. Follow the setup wizard (downloads Ubuntu rootfs)
            3. Use the terminal!

            ### Requirements
            - Android 10+ (API 29)
            - ~500MB free storage for initial setup
            - Internet connection for first-time setup
          files: artifacts/*
          draft: false
          prerelease: false

